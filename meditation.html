<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冥想指导 · 阿育吠陀</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cinzel:wght@400;600&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #F5ECD7;
    --gold: #C8903A;
    --gold-light: #D4AF70;
    --brown-deep: #1C0D05;
    --text-cream: #F0E2C8;
    --text-muted: #9A7050;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--brown-deep);
    color: var(--text-cream);
    min-height: 100vh;
  }

  .bg-layer {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 50% at 20% 10%, #2A1208 0%, transparent 60%),
                radial-gradient(ellipse 60% 70% at 80% 90%, #1C0D05 0%, transparent 50%),
                linear-gradient(160deg, #1C0D05 0%, #0E0703 100%);
    z-index: 0;
  }
  .grain {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03; z-index: 1; pointer-events: none;
  }
  .dosha-glow { position: fixed; inset: 0; z-index: 0; }

  .page {
    position: relative; z-index: 10;
    max-width: 700px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }

  /* Nav */
  .top-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2.5rem;
  }
  .back-link {
    font-size: 12px; color: var(--text-muted);
    text-decoration: none; letter-spacing: 0.1em;
    transition: color 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .back-link:hover { color: var(--gold-light); }
  .page-tag {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.35em;
    color: var(--gold); opacity: 0.7;
  }

  /* Hero */
  .hero {
    text-align: center; margin-bottom: 3rem;
    animation: fadeUp 0.9s ease both;
  }
  .hero-icon { margin-bottom: 1rem; line-height: 1; display: flex; justify-content: center; }
  .hero-sub {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.4em;
    color: var(--gold-light); opacity: 0.65; margin-bottom: 0.6rem;
  }
  .hero-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1.6rem, 4vw, 2.3rem);
    font-weight: 300; letter-spacing: 0.1em;
    color: var(--cream); margin-bottom: 0.8rem;
  }
  .hero-title span { font-weight: 400; }
  .hero-desc {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem; font-weight: 300;
    color: #B89070; line-height: 1.9;
    letter-spacing: 0.06em; max-width: 480px; margin: 0 auto;
  }

  /* Tabs */
  .dosha-tabs {
    display: flex; gap: 0.6rem;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.9s 0.1s ease both;
  }
  .tab-btn {
    flex: 1; padding: 0.6rem 0.5rem;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(212,175,112,0.15);
    border-radius: 8px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px; letter-spacing: 0.08em;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.25s; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .tab-btn:hover { border-color: rgba(212,175,112,0.35); color: var(--cream); }
  .tab-btn.active { color: var(--cream); border-width: 1px; }

  /* Section */
  .section { margin-bottom: 2rem; animation: fadeUp 0.9s 0.15s ease both; }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.35em;
    color: var(--gold); margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 0.5px;
    background: rgba(212,175,112,0.2);
  }

  /* Principle box */
  .principle-box {
    padding: 1.2rem 1.5rem;
    border-radius: 12px;
    border-left: 2px solid;
    background: rgba(255,255,255,0.025);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem; font-weight: 300;
    color: #C9A882; line-height: 1.8; letter-spacing: 0.06em;
    margin-bottom: 1.5rem;
  }

  /* Timer widget */
  .timer-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1.5rem;
    border-radius: 16px;
    background: rgba(255,255,255,0.025);
    border: 0.5px solid rgba(212,175,112,0.15);
    margin-bottom: 1.5rem;
    position: relative; overflow: hidden;
  }
  .timer-ring-wrap {
    position: relative;
    width: 160px; height: 160px;
    margin-bottom: 1.5rem;
  }
  .timer-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .timer-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }
  .timer-progress {
    fill: none; stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .timer-display {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem; font-weight: 400;
    letter-spacing: 0.05em; line-height: 1;
  }
  .timer-label {
    font-size: 10px; letter-spacing: 0.2em;
    color: var(--text-muted); margin-top: 4px;
  }
  .timer-phase {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem; color: #C9A882;
    letter-spacing: 0.1em; margin-bottom: 1.5rem;
    min-height: 1.4em; text-align: center;
  }
  .timer-btns {
    display: flex; gap: 0.8rem;
  }
  .timer-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px; letter-spacing: 0.15em;
    padding: 0.55rem 1.6rem;
    border-radius: 60px; cursor: pointer;
    transition: all 0.25s;
  }
  .timer-btn.start {
    color: var(--cream);
    border: none;
    background: linear-gradient(135deg, #C8903A 0%, #A06B22 100%);
  }
  .timer-btn.start:hover { box-shadow: 0 4px 16px rgba(200,144,58,0.3); transform: translateY(-1px); }
  .timer-btn.reset {
    color: var(--text-muted);
    background: none;
    border: 0.5px solid rgba(212,175,112,0.2);
  }
  .timer-btn.reset:hover { color: var(--cream); border-color: rgba(212,175,112,0.5); }
  .timer-duration-row {
    display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .dur-btn {
    font-size: 11px; letter-spacing: 0.1em;
    padding: 4px 14px; border-radius: 60px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(212,175,112,0.15);
    color: var(--text-muted); cursor: pointer;
    transition: all 0.2s;
  }
  .dur-btn.active, .dur-btn:hover {
    border-color: rgba(212,175,112,0.45);
    color: var(--cream);
  }

  /* Technique cards */
  .technique-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0.9rem; margin-bottom: 1.5rem;
  }
  .technique-card {
    padding: 1.3rem 1.4rem;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(212,175,112,0.12);
    transition: all 0.25s;
  }
  .technique-card:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(212,175,112,0.28);
  }
  .tech-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 0.7rem;
  }
  .tech-icon { font-size: 1.4rem; flex-shrink: 0; }
  .tech-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem; font-weight: 400;
    color: var(--cream); letter-spacing: 0.08em;
  }
  .tech-sanskrit {
    font-family: 'Cinzel', serif;
    font-size: 9px; letter-spacing: 0.2em;
    opacity: 0.4; margin-top: 1px;
  }
  .tech-desc {
    font-size: 0.85rem; color: var(--text-muted);
    line-height: 1.7; letter-spacing: 0.03em;
    margin-bottom: 0.7rem;
  }
  .tech-steps {
    list-style: none; display: flex; flex-direction: column; gap: 4px;
  }
  .tech-steps li {
    font-size: 12px; color: #8A6040;
    letter-spacing: 0.04em; line-height: 1.5;
    display: flex; gap: 8px;
  }
  .tech-steps li::before {
    content: attr(data-n);
    flex-shrink: 0; opacity: 0.5;
    font-family: 'Cinzel', serif; font-size: 10px;
  }

  /* Mantra cards */
  .mantra-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.8rem;
  }
  .mantra-card {
    padding: 1.2rem 1.2rem;
    border-radius: 12px;
    background: rgba(255,255,255,0.025);
    border: 0.5px solid rgba(212,175,112,0.12);
    text-align: center;
  }
  .mantra-text {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem; letter-spacing: 0.18em;
    margin-bottom: 0.5rem; line-height: 1.4;
  }
  .mantra-meaning {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem; font-weight: 300;
    color: var(--text-muted); line-height: 1.6;
    letter-spacing: 0.05em;
  }
  .mantra-use {
    margin-top: 0.6rem;
    font-size: 11px; letter-spacing: 0.1em;
    padding: 3px 10px; border-radius: 60px;
    display: inline-block;
    border: 0.5px solid;
  }

  /* Daily ritual */
  .ritual-timeline {
    display: flex; flex-direction: column; gap: 0;
    position: relative;
  }
  .ritual-timeline::before {
    content: '';
    position: absolute; left: 20px; top: 0; bottom: 0;
    width: 0.5px; background: rgba(212,175,112,0.15);
  }
  .ritual-item {
    display: flex; gap: 1.2rem; align-items: flex-start;
    padding: 0.9rem 0;
    position: relative;
  }
  .ritual-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
    border: 1.5px solid;
    background: var(--brown-deep);
    position: relative; z-index: 1;
    margin-left: 15px;
  }
  .ritual-time {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 0.18em;
    opacity: 0.5; margin-bottom: 3px; flex-shrink: 0;
    width: 55px;
  }
  .ritual-body {}
  .ritual-name {
    font-size: 0.9rem; color: var(--cream);
    letter-spacing: 0.06em; margin-bottom: 2px;
  }
  .ritual-detail {
    font-size: 12px; color: var(--text-muted);
    line-height: 1.5; letter-spacing: 0.03em;
  }

  /* Tip */
  .tip-box {
    padding: 1.1rem 1.4rem;
    border-radius: 10px;
    background: rgba(212,175,112,0.05);
    border: 0.5px solid rgba(212,175,112,0.18);
    font-size: 0.88rem; color: #B89070;
    line-height: 1.7; letter-spacing: 0.04em;
    margin-bottom: 1.5rem;
  }
  .tip-box strong { color: var(--gold-light); font-weight: 400; }

  /* Ornament */
  .ornament-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin: 2rem 0;
  }
  .ornament-divider-line { height: 0.5px; flex: 1; background: rgba(212,175,112,0.15); }
  .ornament-divider-symbol { font-size: 14px; color: var(--gold-light); opacity: 0.4; }

  /* Bottom nav */
  .bottom-nav {
    display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
    margin-top: 3rem;
    animation: fadeUp 0.9s 0.4s ease both;
  }
  .nav-btn {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px; letter-spacing: 0.12em;
    color: var(--text-muted); text-decoration: none;
    background: none;
    border: 0.5px solid rgba(212,175,112,0.2);
    border-radius: 60px; padding: 0.65rem 1.8rem;
    cursor: pointer; transition: all 0.25s; display: inline-block;
  }
  .nav-btn:hover { color: var(--cream); border-color: rgba(212,175,112,0.5); }
  .nav-btn.primary {
    background: linear-gradient(135deg, #C8903A 0%, #A06B22 100%);
    border-color: rgba(212,175,112,0.4); color: var(--cream);
  }
  .nav-btn.primary:hover {
    box-shadow: 0 4px 20px rgba(200,144,58,0.3);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grain"></div>
<div class="dosha-glow" id="doshaGlow"></div>

<div class="page">
  <div class="top-nav">
    <a href="javascript:history.back()" class="back-link">← 返回</a>
    <div class="page-tag">Dhyāna · 冥想之道</div>
  </div>

  <div class="hero">
    <div class="hero-icon" id="heroIcon"></div>
    <div class="hero-sub">专属冥想方案</div>
    <h1 class="hero-title"><span id="doshaName"></span> 冥想指导</h1>
    <p class="hero-desc" id="heroPrinciple"></p>
  </div>

  <!-- Tabs -->
  <div class="dosha-tabs">
    <button class="tab-btn" onclick="switchDosha('vata')" id="tab-vata">
      <span>
        <svg width="22" height="22" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 44C14 36 20 28 32 18C38 13 46 9 46 9C46 9 44 18 40 24C35 32 26 38 18 42L10 44Z" fill="#4A8C5C" opacity="0.3"/>
          <path d="M10 44C14 36 20 28 32 18C38 13 46 9 46 9C46 9 44 18 40 24C35 32 26 38 18 42L10 44Z" stroke="#6B9E78" stroke-width="1.5" stroke-linejoin="round"/>
          <line x1="10" y1="44" x2="46" y2="9" stroke="#6B9E78" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
        </svg>
      </span>
      风型 Vāta
    </button>
    <button class="tab-btn" onclick="switchDosha('pitta')" id="tab-pitta">
      <span style="font-size:1.2rem">🔥</span>
      火型 Pitta
    </button>
    <button class="tab-btn" onclick="switchDosha('kapha')" id="tab-kapha">
      <span>
        <svg width="22" height="22" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="26,6 48,44 4,44" fill="#5A3D28" opacity="0.3"/>
          <polygon points="26,6 48,44 4,44" stroke="#8B6347" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="26,14 42,40 10,40" stroke="#BFA08A" stroke-width="0.8" opacity="0.5"/>
          <circle cx="26" cy="6" r="1.8" fill="#8B6347"/>
          <circle cx="48" cy="44" r="1.8" fill="#8B6347"/>
          <circle cx="4" cy="44" r="1.8" fill="#8B6347"/>
        </svg>
      </span>
      土型 Kapha
    </button>
  </div>

  <div id="content"></div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <a href="javascript:history.back()" class="nav-btn">← 返回</a>
    <a href="result.html" class="nav-btn">回到结果页</a>
    <a href="ayurveda-cover.html" class="nav-btn primary">✾ 回到首页</a>
  </div>
</div>

<script>
const SVG_VATA_LARGE = `<svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 44C14 36 20 28 32 18C38 13 46 9 46 9C46 9 44 18 40 24C35 32 26 38 18 42L10 44Z" fill="#4A8C5C" opacity="0.25"/><path d="M10 44C14 36 20 28 32 18C38 13 46 9 46 9C46 9 44 18 40 24C35 32 26 38 18 42L10 44Z" stroke="#6B9E78" stroke-width="1.2" stroke-linejoin="round"/><line x1="10" y1="44" x2="46" y2="9" stroke="#6B9E78" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/><path d="M20 38 Q28 28 38 16" stroke="#A8CDB2" stroke-width="0.8" opacity="0.5"/></svg>`;
const SVG_KAPHA_LARGE = `<svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="26,6 48,44 4,44" fill="#5A3D28" opacity="0.3"/><polygon points="26,6 48,44 4,44" stroke="#8B6347" stroke-width="1.4" stroke-linejoin="round"/><polygon points="26,14 42,40 10,40" stroke="#BFA08A" stroke-width="0.7" opacity="0.5"/><circle cx="26" cy="6" r="1.5" fill="#8B6347"/><circle cx="48" cy="44" r="1.5" fill="#8B6347"/><circle cx="4" cy="44" r="1.5" fill="#8B6347"/></svg>`;

const MEDITATION = {
  vata: {
    heroIcon: SVG_VATA_LARGE,
    name: "风型",
    color: "#6B9E78",
    colorLight: "#A8CDB2",
    glow: "rgba(107,158,120,0.1)",
    principle: "风型体质思绪飘忽、难以安定，冥想应以「扎根、专注、温暖」为核心。从短时间开始，借助固定的仪式感帮助进入状态。",
    timerColor: "#6B9E78",
    timerPhases: ["放松入定", "专注呼吸", "扎根冥想", "深度静止", "轻柔回归"],
    tip: "<strong>冥想小贴士：</strong>每天同一时间、同一地点练习，仪式感对风型至关重要。可使用温暖的毛毯裹住身体，点燃乳香或檀香，帮助扎根。",
    techniques: [
      {
        icon: "🕯️", name: "烛光冥想", sanskrit: "Trataka",
        desc: "凝视烛光，让飘忽的思绪随火焰稳定下来，是风型最有效的专注冥想之一。",
        steps: ["点燃蜡烛置于眼前60cm处", "柔和凝视火焰，不眨眼直到流泪", "闭眼在脑海中保持烛光意象", "重复3-5次，每次3-5分钟"]
      },
      {
        icon: "🌍", name: "身体扫描冥想", sanskrit: "Yoga Nidrā",
        desc: "从头到脚逐一感知身体各部位，帮助思维回归当下，消除焦虑与游荡。",
        steps: ["仰卧，全身放松", "从脚趾开始，缓慢向上扫描身体", "感受每个部位的重量与温度", "全程20-45分钟"]
      },
      {
        icon: "🪨", name: "大地观想冥想", sanskrit: "Bhūmi Dhyāna",
        desc: "观想自己如山岳般稳固，根植大地，是专为风型设计的扎根练习。",
        steps: ["坐姿，感受臀部与地面的接触", "想象根系从脊柱延伸入地", "每次呼气时感受重力下沉", "保持15-20分钟"]
      }
    ],
    mantras: [
      { text: "SO HUM", meaning: "我即是那（宇宙本源）\n随呼吸默念：吸气SO，呼气HUM", color: "#6B9E78", use: "安定游荡思绪" },
      { text: "OM", meaning: "宇宙原音，凝聚散乱\n感受振动从心脏扩散", color: "#A8CDB2", use: "专注扎根" },
      { text: "RAM", meaning: "火的种子音，带来温暖\n帮助风型获得稳定感", color: "#6B9E78", use: "温暖滋养" }
    ],
    ritual: [
      { time: "起床后", name: "感恩静坐", detail: "坐于床边，双手置膝，深呼吸3次，默念今日意图" },
      { time: "晨间", name: "扎根冥想", detail: "10-20分钟烛光冥想或SO HUM咒语，建立全天稳定基础" },
      { time: "午间", name: "正念片刻", detail: "3-5分钟腹式呼吸，重新扎根，避免午后能量涣散" },
      { time: "傍晚", name: "瑜伽休息术", detail: "20-30分钟Yoga Nidrā，深度修复神经系统" },
      { time: "睡前", name: "感恩日记", detail: "写下3件感恩的事，安抚焦虑思绪，帮助入眠" }
    ]
  },
  pitta: {
    heroIcon: `<span style="font-size:3rem">🔥</span>`,
    name: "火型",
    color: "#C85A3A",
    colorLight: "#E89A82",

// Timer state
let timerInterval = null;
let timerRunning = false;
let timerSeconds = 0;
let timerTotal = 600;
let timerPhaseIndex = 0;
let currentDosha = 'vata';

function getDosha() {
  const p = new URLSearchParams(window.location.search);
  return p.get('dosha') || 'vata';
}

function switchDosha(dosha) {
  resetTimer();
  currentDosha = dosha;
  renderContent();
  updateTabs();
}

function updateTabs() {
  ['vata','pitta','kapha'].forEach(d => {
    const tab = document.getElementById('tab-' + d);
    tab.classList.toggle('active', d === currentDosha);
    tab.style.borderColor = d === currentDosha ? MEDITATION[d].color : '';
    tab.style.color = d === currentDosha ? MEDITATION[d].colorLight : '';
  });
}

function setDuration(mins) {
  resetTimer();
  timerTotal = mins * 60;
  document.querySelectorAll('.dur-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.mins) === mins);
  });
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const remaining = timerTotal - timerSeconds;
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  const el = document.getElementById('timerDisplay');
  if (el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  const pct = timerSeconds / timerTotal;
  const r = 68;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct);
  const prog = document.getElementById('timerProgress');
  if (prog) {
    prog.style.strokeDasharray = circ;
    prog.style.strokeDashoffset = offset;
  }

  const d = MEDITATION[currentDosha];
  const phaseIdx = Math.min(Math.floor(pct * d.timerPhases.length), d.timerPhases.length - 1);
  const phaseEl = document.getElementById('timerPhase');
  if (phaseEl) phaseEl.textContent = timerRunning ? d.timerPhases[phaseIdx] : (timerSeconds === 0 ? '准备开始' : '已暂停');
}

function toggleTimer() {
  const btn = document.getElementById('startBtn');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    if (btn) btn.textContent = '继续';
    updateTimerDisplay();
  } else {
    if (timerSeconds >= timerTotal) resetTimer();
    timerRunning = true;
    if (btn) btn.textContent = '暂停';
    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
      if (timerSeconds >= timerTotal) {
        clearInterval(timerInterval);
        timerRunning = false;
        if (btn) btn.textContent = '重新开始';
        const phaseEl = document.getElementById('timerPhase');
        if (phaseEl) phaseEl.textContent = '冥想完成 🪷';
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  const btn = document.getElementById('startBtn');
  if (btn) btn.textContent = '开始冥想';
  updateTimerDisplay();
}

function renderContent() {
  const d = MEDITATION[currentDosha];

  // Hero
  document.getElementById('heroIcon').innerHTML = d.heroIcon;
  document.getElementById('doshaName').textContent = d.name;
  document.getElementById('heroPrinciple').textContent = d.principle;
  document.getElementById('doshaGlow').style.background =
    `radial-gradient(ellipse 60% 40% at 50% 20%, ${d.glow} 0%, transparent 70%)`;

  const r = 68;
  const circ = 2 * Math.PI * r;

  document.getElementById('content').innerHTML = `
    <!-- Principle -->
    <div class="section">
      <div class="section-title">冥想原则</div>
      <div class="principle-box" style="border-left-color:${d.color}">${d.principle}</div>
    </div>

    <!-- Timer -->
    <div class="section">
      <div class="section-title">冥想计时器</div>
      <div class="timer-wrap">
        <div class="timer-duration-row">
          ${[5,10,15,20].map(m => `<button class="dur-btn${timerTotal===m*60?' active':''}" data-mins="${m}" onclick="setDuration(${m})">${m}分钟</button>`).join('')}
        </div>
        <div class="timer-ring-wrap">
          <svg class="timer-svg" viewBox="0 0 160 160">

            <div class="mantra-meaning">${m.meaning}</div>

    <!-- Daily ritual -->

      <div class="tip-box">${d.tip}</div>
      <div class="ritual-timeline">
        ${d.ritual.map(r => `
          <div class="ritual-item">
            <div class="ritual-dot" style="border-color:${d.color}"></div>

            <div class="ritual-body">
              <div class="ritual-name">${r.name}</div>
              <div class="ritual-detail">${r.detail}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  updateTimerDisplay();
}

currentDosha = getDosha();
renderContent();
updateTabs();
</script>

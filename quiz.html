  // Animate out
  if (direction) {
    slide.classList.add(direction === 1 ? 'slide-out-left' : 'slide-out-right');
  }

  setTimeout(() => {
    // Update content
    document.getElementById('qCategory').textContent = q.category;
    document.getElementById('qNumber').textContent = String(current + 1).padStart(2, '0');
    document.getElementById('qText').textContent = q.text;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
      btn.innerHTML = `
        <span class="option-tag">${LABELS[i]}</span>
        <span class="option-text">${opt.label}</span>
      `;
      btn.onclick = () => selectOption(i);
      container.appendChild(btn);
    });

    // Progress
    const pct = ((current + 1) / questions.length * 100).toFixed(0);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `第 ${current + 1} / ${questions.length} 题`;

    // Buttons
    document.getElementById('prevBtn').disabled = current === 0;
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.disabled = answers[current] === null;
    nextBtn.textContent = current === questions.length - 1 ? '查看结果 →' : '下一题 →';

    // Animate in
    if (direction) {
      slide.classList.remove('slide-out-left', 'slide-out-right');
      slide.classList.add(direction === 1 ? 'slide-in-right' : 'slide-in-left');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          slide.classList.remove('slide-in-right', 'slide-in-left');
        });
      });
    }
  }, direction ? 280 : 0);
}

function selectOption(index) {
  answers[current] = index;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === index);
  });
  document.getElementById('nextBtn').disabled = false;
}

function navigate(dir) {
  if (dir === 1 && current === questions.length - 1) {
    goToResult();
    return;
  }
  const next = current + dir;
  if (next < 0 || next >= questions.length) return;
  current = next;
  render(dir);
}

function goToResult() {
  // Tally scores
  const scores = { vata: 0, pitta: 0, kapha: 0 };
  answers.forEach((ansIndex, qIndex) => {
    if (ansIndex !== null) {
      const dosha = questions[qIndex].options[ansIndex].dosha;
      scores[dosha]++;
    }
  });
  const params = new URLSearchParams({
    vata: scores.vata,
    pitta: scores.pitta,
    kapha: scores.kapha
  });
  window.location.href = 'result.html?' + params.toString();
}

// Init
render(null);
</script>
</body>
</html>
